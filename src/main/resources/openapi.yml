openapi: 3.0.1
info:
  title: Biblio2 API
  version: "1.0.0"
  description: API para gestión de libros, usuarios y préstamos

servers:
  - url: http://localhost:8080
    description: Desarrollo local
  - url: /
    description: Servidor actual

security:
  - basicAuth: []

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Usuario y contraseña (defecto - Omora / Jinxvi2205)

  schemas:
    LibroRequest:
      type: object
      required:
        - titulo
        - autor
        - isbn
      properties:
        titulo:
          type: string
          description: Título del libro
          example: "Don Quijote de la Mancha"
        autor:
          type: string
          description: Autor del libro
          example: "Miguel de Cervantes"
        isbn:
          type: string
          description: ISBN del libro
          example: "978-8491050277"

    LibroResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        titulo:
          type: string
          example: "Don Quijote de la Mancha"
        autor:
          type: string
          example: "Miguel de Cervantes"
        isbn:
          type: string
          example: "978-8491050277"
        prestado:
          type: boolean
          example: false

    PrestamoRequest:
      type: object
      required:
        - usuarioId
        - libroId
      properties:
        usuarioId:
          type: integer
          format: int64
          description: ID del usuario que realiza el préstamo
          example: 1
        libroId:
          type: integer
          format: int64
          description: ID del libro a prestar
          example: 2

    PrestamoResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 5
        usuarioId:
          type: integer
          format: int64
          example: 1
        libroId:
          type: integer
          format: int64
          example: 2
        fechaPrestamo:
          type: string
          format: date-time
          example: "2026-06-01T10:00:00Z"
        fechaDevolucion:
          type: string
          format: date-time
          nullable: true
          example: null
        devuelto:
          type: boolean
          example: false

    UsuarioRequest:
      type: object
      required:
        - nombre
        - email
        - password
      properties:
        nombre:
          type: string
          description: Nombre del usuario
          example: "Ana Pérez"
        email:
          type: string
          format: email
          description: Email único del usuario
          example: "ana.perez@example.com"
        password:
          type: string
          format: password
          description: Contraseña del usuario
          example: "Secreto123"

    UsuarioResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        nombre:
          type: string
          example: "Ana Pérez"
        email:
          type: string
          example: "ana.perez@example.com"

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string

paths:
  /api/libros:
    get:
      summary: Obtener todos los libros
      description: Retorna una lista de todos los libros registrados en el sistema
      operationId: obtenerTodos
      tags:
        - Libros
      responses:
        '200':
          description: Lista de libros obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LibroResponse'
              examples:
                success:
                  value:
                    - id: 1
                      titulo: "Don Quijote de la Mancha"
                      autor: "Miguel de Cervantes"
                      isbn: "978-8491050277"
                      prestado: false
                    - id: 2
                      titulo: "Cien años de soledad"
                      autor: "Gabriel García Márquez"
                      isbn: "978-9584236821"
                      prestado: true

    post:
      summary: Crear un nuevo libro
      description: Crea un nuevo libro en el sistema
      operationId: crearLibro
      tags:
        - Libros
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LibroRequest'
            examples:
              example1:
                value:
                  titulo: "Cien años de soledad"
                  autor: "Gabriel García Márquez"
                  isbn: "978-9584236821"
      responses:
        '201':
          description: Libro creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibroResponse'
              examples:
                created:
                  value:
                    id: 10
                    titulo: "Cien años de soledad"
                    autor: "Gabriel García Márquez"
                    isbn: "978-9584236821"
                    prestado: false
        '400':
          description: Datos inválidos en la solicitud

  /api/libros/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID único del libro
        schema:
          type: integer
          format: int64

    get:
      summary: Obtener libro por ID
      description: Obtiene los detalles de un libro específico por su ID
      operationId: obtenerPorId
      tags:
        - Libros
      responses:
        '200':
          description: Libro encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibroResponse'
              examples:
                success:
                  value:
                    id: 1
                    titulo: "Don Quijote de la Mancha"
                    autor: "Miguel de Cervantes"
                    isbn: "978-8491050277"
                    prestado: false
        '404':
          description: Libro no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Actualizar libro
      description: Actualiza los datos de un libro existente
      operationId: actualizarLibro
      tags:
        - Libros
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LibroRequest'
            examples:
              example1:
                value:
                  titulo: "Don Quijote (Edición Especial)"
                  autor: "Miguel de Cervantes"
                  isbn: "978-8491050277"
      responses:
        '200':
          description: Libro actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibroResponse'
              examples:
                updated:
                  value:
                    id: 1
                    titulo: "Don Quijote (Edición Especial)"
                    autor: "Miguel de Cervantes"
                    isbn: "978-8491050277"
                    prestado: false
        '404':
          description: Libro no encontrado

    delete:
      summary: Eliminar libro
      description: Elimina un libro del sistema
      operationId: eliminarLibro
      tags:
        - Libros
      responses:
        '204':
          description: Libro eliminado exitosamente
        '404':
          description: Libro no encontrado

  /api/prestamos:
    post:
      summary: Crear préstamo
      description: Crea un nuevo préstamo de un libro a un usuario
      operationId: crear
      tags:
        - Prestamos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrestamoRequest'
            examples:
              example1:
                value:
                  usuarioId: 1
                  libroId: 2
      responses:
        '201':
          description: Préstamo creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrestamoResponse'
              examples:
                created:
                  value:
                    id: 5
                    usuarioId: 1
                    libroId: 2
                    fechaPrestamo: "2026-06-14T10:00:00Z"
                    fechaDevolucion: null
                    devuelto: false
        '400':
          description: Datos inválidos o libro ya prestado

  /api/prestamos/{id}/devolver:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del préstamo a devolver
        schema:
          type: integer
          format: int64

    put:
      summary: Devolver préstamo
      description: Registra la devolución de un préstamo
      operationId: devolver
      tags:
        - Prestamos
      responses:
        '200':
          description: Devolución registrada exitosamente
        '404':
          description: Préstamo no encontrado

  /api/prestamos/{id}/renovar:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del préstamo a renovar
        schema:
          type: integer
          format: int64

    put:
      summary: Renovar préstamo
      description: Renueva la fecha de devolución de un préstamo activo
      operationId: renovar
      tags:
        - Prestamos
      responses:
        '200':
          description: Préstamo renovado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrestamoResponse'
              examples:
                renewed:
                  value:
                    id: 5
                    usuarioId: 1
                    libroId: 2
                    fechaPrestamo: "2026-06-14T10:00:00Z"
                    fechaDevolucion: "2026-06-28T10:00:00Z"
                    devuelto: false
        '404':
          description: Préstamo no encontrado

  /api/prestamos/usuario/{usuarioId}:
    parameters:
      - name: usuarioId
        in: path
        required: true
        description: ID del usuario
        schema:
          type: integer
          format: int64

    get:
      summary: Listar prestamos por usuario
      description: Obtiene todos los préstamos de un usuario específico
      operationId: listarPorUsuario
      tags:
        - Prestamos
      responses:
        '200':
          description: Lista de préstamos del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PrestamoResponse'
              examples:
                success:
                  value:
                    - id: 5
                      usuarioId: 1
                      libroId: 2
                      fechaPrestamo: "2026-06-14T10:00:00Z"
                      fechaDevolucion: null
                      devuelto: false
                    - id: 6
                      usuarioId: 1
                      libroId: 3
                      fechaPrestamo: "2026-06-10T10:00:00Z"
                      fechaDevolucion: "2026-06-20T10:00:00Z"
                      devuelto: true
        '404':
          description: Usuario no encontrado

  /api/usuarios/registrar:
    post:
      summary: Registrar nuevo usuario
      description: Crea un nuevo usuario en el sistema
      operationId: registrar
      tags:
        - Usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioRequest'
            examples:
              example1:
                value:
                  nombre: "Juan García"
                  email: "juan.garcia@example.com"
                  password: "MiPassword123"
      responses:
        '201':
          description: Usuario registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
              examples:
                created:
                  value:
                    id: 5
                    nombre: "Juan García"
                    email: "juan.garcia@example.com"
        '400':
          description: Datos inválidos o email ya registrado

  /api/usuarios/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del usuario
        schema:
          type: integer
          format: int64

    get:
      summary: Obtener usuario por ID
      description: Obtiene los datos de un usuario por su ID
      operationId: obtenerPorIdUsuario
      tags:
        - Usuarios
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
              examples:
                success:
                  value:
                    id: 1
                    nombre: "Ana Pérez"
                    email: "ana.perez@example.com"
        '404':
          description: Usuario no encontrado

    put:
      summary: Actualizar usuario
      description: Actualiza los datos de un usuario existente
      operationId: actualizar
      tags:
        - Usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                  example: "Ana Pérez Actualizada"
                email:
                  type: string
                  format: email
                  example: "ana.nueva@example.com"
      responses:
        '200':
          description: Usuario actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
              examples:
                updated:
                  value:
                    id: 1
                    nombre: "Ana Pérez Actualizada"
                    email: "ana.nueva@example.com"
        '404':
          description: Usuario no encontrado

  /api/usuarios/email/{email}:
    parameters:
      - name: email
        in: path
        required: true
        description: Email del usuario
        schema:
          type: string
          format: email

    get:
      summary: Obtener usuario por email
      description: Busca un usuario por su dirección de email
      operationId: obtenerPorEmail
      tags:
        - Usuarios
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
              examples:
                success:
                  value:
                    id: 1
                    nombre: "Ana Pérez"
                    email: "ana.perez@example.com"
        '404':
          description: Usuario no encontrado con ese email

tags:
  - name: Libros
    description: Operaciones relacionadas con libros
  - name: Prestamos
    description: Operaciones relacionadas con préstamos
  - name: Usuarios
    description: Operaciones relacionadas con usuarios
