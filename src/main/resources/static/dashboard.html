<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Biblio2 - Dashboard</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f3f6fb;margin:0;padding:30px}
    .box{max-width:980px;margin:0 auto}
    header{display:flex;justify-content:space-between;align-items:center}
    h1{font-size:24px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px}
    .card{background:white;padding:20px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.06)}
    .card h3{margin:0 0 8px}
    .btn{display:inline-block;padding:8px 12px;background:#4f46e5;color:white;border-radius:6px;text-decoration:none}
  </style>
</head>
<body>
  <div class="box">
    <header>
      <h1>📚 Biblio2 - Dashboard</h1>
      <form method="POST" action="/logout" style="margin:0"><button type="submit">Cerrar sesión</button></form>
    </header>

    <section class="grid">
      <div class="card">
        <h3>Libros</h3>
        <p>Gestiona el catálogo de libros</p>
        <p><a class="btn" href="/api/libros">Ver API</a></p>
      </div>
      <div class="card">
        <h3>Préstamos</h3>
        <p>Administra préstamos y devoluciones</p>
        <p><a class="btn" href="/api/prestamos">Ver API</a></p>
      </div>
      <div class="card">
        <h3>Base de datos</h3>
        <p>Accede a la consola H2</p>
        <p><a class="btn" target="_blank" href="/h2-console">Ir a H2</a></p>
      </div>
    </section>
  </div>
</body>
</html>
